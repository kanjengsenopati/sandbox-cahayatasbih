name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_PORT || '22' }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          DB_MASTER_PASSWORD: ${{ secrets.DB_MASTER_PASSWORD }}
        run: |
          ssh -o StrictHostKeyChecking=no -p $VPS_PORT $VPS_USER@$VPS_HOST <<EOF
            set -e
            cd $DEPLOY_PATH

            echo "=== Pulling latest changes ==="
            git config --global --add safe.directory $DEPLOY_PATH
            git fetch --all
            git reset --hard origin/main

            echo "=== Refreshing Autoloader ==="
            composer dump-autoload

            echo "=== Clearing Cache ==="
            php artisan config:clear
            php artisan cache:clear
            php artisan route:clear
            php artisan view:clear

            echo "=== Running Audit ==="
            php artisan app:audit || echo "Audit failed"

            echo "=== Fixing Permissions ==="
            chown -R www:www $DEPLOY_PATH || echo "Failed to chown"
            find $DEPLOY_PATH -type d -exec chmod 775 {} \; || echo "Failed to chmod dirs"
            find $DEPLOY_PATH -type f -exec chmod 664 {} \; || echo "Failed to chmod files"
            chmod -R 775 $DEPLOY_PATH/storage || echo "Failed to chmod storage"
            chmod -R 775 $DEPLOY_PATH/bootstrap/cache || echo "Failed to chmod cache"
            chmod 660 $DEPLOY_PATH/.env || chmod 600 $DEPLOY_PATH/.env || echo "Failed to secure .env"

            echo "=== Adding Master DB Credentials ==="
            if ! grep -q "DB_MASTER_HOST" $DEPLOY_PATH/.env; then
              echo "" >> $DEPLOY_PATH/.env
              echo "# Master Database Connection (cahayatasbihdb)" >> $DEPLOY_PATH/.env
              echo "DB_MASTER_HOST=103.193.179.146" >> $DEPLOY_PATH/.env
              echo "DB_MASTER_PORT=3306" >> $DEPLOY_PATH/.env
              echo "DB_MASTER_DATABASE=cahayatasbihdb" >> $DEPLOY_PATH/.env
              echo "DB_MASTER_USERNAME=cahayatasbih" >> $DEPLOY_PATH/.env
              echo "DB_MASTER_PASSWORD=$DB_MASTER_PASSWORD" >> $DEPLOY_PATH/.env
              echo "Master DB credentials added to .env"
            else
              echo "Master DB credentials already present in .env, skipping"
            fi

            echo "=== Deployment Finished ==="
          EOF
