name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.VPS_PORT || '22' }} -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
        run: |
          ssh -o StrictHostKeyChecking=no -p $VPS_PORT $VPS_USER@$VPS_HOST <<EOF
            set -e
            cd $DEPLOY_PATH

            echo "=== Pulling latest changes ==="
            git config --global --add safe.directory $DEPLOY_PATH
            git fetch --all
            git reset --hard origin/main

            echo "=== VPS DIAGNOSTICS ==="
            echo "Current User: $(whoami)"
            echo "Current Path: $(pwd)"
            echo "Files in current path:"
            ls -la
            echo "Files in public folder:"
            ls -la public || echo "No public folder"
            echo "Nginx Config:"
            cat /www/server/panel/vhost/nginx/aplikasi.cahayatasbih.or.id.conf || echo "No config"

            echo "=== Refreshing Autoloader ==="
            composer dump-autoload

            echo "=== Clearing Cache ==="
            php artisan config:clear
            php artisan cache:clear
            php artisan route:clear
            php artisan view:clear

            echo "=== Running Audit ==="
            php artisan app:audit

            echo "=== Latest Laravel Logs ==="
            tail -n 50 storage/logs/laravel.log || echo "No laravel logs found"

            echo "=== Nginx Error Logs ==="
            tail -n 50 /www/wwwlogs/aplikasi.cahayatasbih.or.id.error.log || echo "No nginx logs found"

            echo "=== Deployment Finished ==="
          EOF
