name: Deploy to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.5.4
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Sync files to VPS
        run: |
          rsync -az --exclude='.git*' --exclude='node_modules' --exclude='vendor' ./ user@your.vps.ip:/var/www/cahayatasbih

      - name: Install Composer dependencies
        run: |
          ssh user@your.vps.ip 'cd /var/www/cahayatasbih && composer install --no-interaction --prefer-dist --optimize-autoloader'

      - name: Run migrations and clear cache
        run: |
          ssh user@your.vps.ip 'cd /var/www/cahayatasbih && php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache'

      - name: Restart queue workers (optional)
        run: |
          ssh user@your.vps.ip "sudo systemctl restart php-fpm && sudo systemctl restart nginx"
